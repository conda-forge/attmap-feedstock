{% set name = "attmap" %}
{% set version = "0.14.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: ea9538fadc0d4c17f467f3a6ec508eb18460a16fb2a641c855ad5fdc2ae2b3be

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.6
  run:
    - python >=3.6
    - ubiquerg >=0.2.1

test:
  imports:
    - attmap

about:
  home: https://github.com/pepkit/attmap
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Multiple access patterns for key-value reference

extra:
  recipe-maintainers:
    - stolarczyk
